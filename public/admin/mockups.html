<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mockup Upload — Admin</title>
    <link rel="stylesheet" href="/styles.css">
    <style>main{padding:32px}</style>
  </head>
  <body>
    <nav class="navbar"><div class="container"><div class="navbar-brand"><a href="/" class="brand-link"><h2>databrain</h2></a></div></div></nav>
    <main class="container">
      <h1>Upload Reference Mockup</h1>
      <p>Upload a screenshot or reference image and an optional description. Agent 2 will use this to compare builds.</p>

      <form id="mockupForm">
        <label>Mockup name*</label>
        <input id="name" required placeholder="kore-demo-hero">

        <label>Description</label>
        <input id="description" placeholder="Short description of the mockup">

        <label>Image*</label>
        <input id="image" type="file" accept="image/*" required>

        <div style="margin-top:12px;"><button class="cta-btn primary" type="submit">Upload Mockup</button></div>
      </form>

      <div id="result" style="margin-top:16px"></div>

      <hr style="margin:28px 0">

      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h2>Uploaded Mockups</h2>
        <div>
          <button id="refreshList" class="cta-btn">Refresh</button>
          <button id="runCheck" class="cta-btn primary">Run Agent 2 Check</button>
        </div>
      </div>

      <div id="mockupList" style="margin-top:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px"></div>

      <div id="checkResult" style="margin-top:18px"></div>
    </main>

    <script>
      document.getElementById('mockupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const description = document.getElementById('description').value.trim();
        const file = document.getElementById('image').files[0];
        const resEl = document.getElementById('result');
        if (!file) return resEl.textContent = 'Select an image file.';
        resEl.textContent = 'Uploading...';
        const reader = new FileReader();
        reader.onload = async () => {
          const imageData = reader.result; // data URL
          try {
            const r = await fetch('/api/mockup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, description, imageData }) });
            const json = await r.json();
            if (!r.ok) throw new Error(json.error || 'Upload failed');
            resEl.textContent = '✅ Uploaded: ' + JSON.stringify(json.meta);
            loadMockups();
          } catch (err) {
            resEl.textContent = '❌ ' + err.message;
          }
        };
        reader.readAsDataURL(file);
      });

      async function loadMockups() {
        const el = document.getElementById('mockupList');
        el.innerHTML = 'Loading...';
        try {
          const r = await fetch('/api/mockups');
          const j = await r.json();
          el.innerHTML = '';
          if (!j.mockups || j.mockups.length === 0) { el.innerHTML = '<em>No mockups uploaded yet.</em>'; return; }
          j.mockups.forEach((m) => {
            const card = document.createElement('div');
            card.style.background = '#fff';
            card.style.border = '1px solid #eee';
            card.style.padding = '12px';
            card.style.borderRadius = '8px';
            const img = document.createElement('img');
            img.src = '/mockups/' + m.filename;
            img.style.width = '100%';
            img.style.height = '140px';
            img.style.objectFit = 'cover';
            img.alt = m.name;
            const title = document.createElement('div');
            title.style.fontWeight = '700';
            title.style.marginTop = '8px';
            title.textContent = m.name;
            const desc = document.createElement('div');
            desc.style.color = '#666';
            desc.style.fontSize = '13px';
            desc.textContent = m.description || '';
            const select = document.createElement('div');
            select.style.marginTop = '8px';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = m.name;
            checkbox.className = 'mockup-select';
            select.appendChild(checkbox);
            const label = document.createElement('span');
            label.textContent = ' Use for rebuild';
            label.style.marginLeft = '6px';
            select.appendChild(label);
            card.appendChild(img);
            card.appendChild(title);
            card.appendChild(desc);
            card.appendChild(select);
            el.appendChild(card);
          });
        } catch (err) {
          el.innerHTML = 'Failed to load mockups: ' + err.message;
        }
      }

      document.getElementById('refreshList').addEventListener('click', loadMockups);

      document.getElementById('runCheck').addEventListener('click', async () => {
        const out = document.getElementById('checkResult');
        out.textContent = 'Running Agent 2 check...';
        try {
          const r = await fetch('/api/agents/check-demo');
          const j = await r.json();
          out.innerHTML = '<pre>' + JSON.stringify(j, null, 2) + '</pre>';
        } catch (err) {
          out.textContent = 'Check failed: ' + err.message;
        }
      });

      document.getElementById('runRebuild').addEventListener('click', async () => {
        const selected = Array.from(document.querySelectorAll('.mockup-select:checked')).map(i => i.value);
        if (selected.length === 0) return alert('Select at least one mockup to use for rebuild');
        const out = document.getElementById('checkResult');
        out.textContent = 'Triggering Agent 1 rebuild using selected mockups...';
        try {
          const r = await fetch('/api/agents/rebuild', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ mockupNames: selected }) });
          const j = await r.json();
          out.innerHTML = '<pre>' + JSON.stringify(j, null, 2) + '</pre>';
        } catch (err) {
          out.textContent = 'Rebuild failed: ' + err.message;
        }
      });

      // initial load
      loadMockups();
    </script>
  </body>
</html>
